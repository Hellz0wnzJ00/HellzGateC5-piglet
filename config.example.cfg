# ============================================================
# HellzGate C5 — master configuration (config.example.cfg)
# Copy to wardriver.cfg on the SD card root and fill in.
# Format: key=value ; lines starting with # are comments.
# Derived from Piglet's wardriver.cfg (CC BY-NC 4.0).
# ============================================================

# ---- Uploads --------------------------------------------------------------
wigleBasicToken=EnterWigleTokenHere
wdgwarsApiKey=EnterWDGWarsAPIKeyHere
maxBootUploads=-1

# ---- Device / Wi-Fi -------------------------------------------------------
deviceName=HellzGateC5
homeSsid=EnterWifiHere
homePsk=EnterWifiPasswordHere
gpsBaud=9600
speedUnits=mph

# ---- Fan control (master) -------------------------------------------------
# fanMode: auto | on | off   (safety override applies in every mode)
# Temps are the HOTTEST node's die temperature, in degrees C.
fanMode=auto
fanTempOn=75          # fan turns on at/above this
fanTempOff=65         # fan turns off at/below this (hysteresis gap)
fanSafety=90          # force fan on above this, regardless of mode
fanFaultWindow=60     # seconds fan may run without cooling before flagging a fault

# ---- Node names (web UI) --------------------------------------------------
# Optional friendly labels for scan nodes by slot (ESP-1..ESP-9). Shown in the
# web UI instead of the MAC. Leave blank to just show the slot number.
nodeName1=
nodeName2=
nodeName3=
nodeName4=
nodeName5=
nodeName6=
nodeName7=
nodeName8=
nodeName9=
